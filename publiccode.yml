description:
  it:
    shortDescription: E-conomato è un gestionale per Enti Locali che dematerializza
      magazzino e Fondo Economale, tracciando spese, P.E.G. e rendicontazioni.
    longDescription: >-
      E-conomato è un gestionale web sviluppato su misura per le pubbliche
      amministrazioni. È progettato per digitalizzare e tracciare le richieste
      di cancelleria e materiale di consumo interno.

      Consente agli uffici di effettuare ordini, ai funzionari di approvarli e
      al magazzino di gestire scorte ed evasioni con scarico automatico dei
      costi tramite logica FIFO.


      Il modulo **Cassa Economale** estende la piattaforma alla gestione del
      Fondo Economale per le piccole spese urgenti in contanti o con carta
      dipartimentale, in conformità con il TUEL (D.Lgs. 267/2000) e con i
      requisiti di Resa del Conto verso la Corte dei Conti (Modello 21
      D.P.R. 194/1996). Schema DB, ruolo Economo, dashboard e capitoli di
      spesa sono operativi (v0.6.x).
    features:
      - economato
      - magazzino
      - spese
      - rendiconto
      - TUEL
      - Modello 21 D.P.R. 194/1996
