# E-conomato — Podman / Docker Compose
# Utilizzo:
#   1. cp .env.example .env
#   2. Adatta .env al tuo ambiente
#   3. podman compose up -d   (oppure: docker compose up -d)
#
# L'immagine viene scaricata automaticamente da ghcr.io.
# Per compilare dal sorgente: podman compose up -d --build

services:
  e-conomato:
    image: ghcr.io/provincia-di-pescara/e-conomato:latest
    container_name: e-conomato
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    env_file:
      - path: .env
        required: false
    environment:
      - APP_PORT=${APP_PORT:-8080}
    volumes:
      # Se DATA_DIR è definito (es. ./data) fa bind mount, altrimenti usa il volume named
      - ${DATA_DIR:-e_conomato_data}:/data:rw,Z

volumes:
  e_conomato_data:
